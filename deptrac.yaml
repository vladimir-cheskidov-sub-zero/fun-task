deptrac:
  paths:
    - ./src
  exclude_files:
    - '#.*Tests?.*#'
  layers:
    - name: Domain
      collectors:
        - type: directory
          value: src/Domain/.*
    - name: Application
      collectors:
        - type: directory
          value: src/Application/.*
    - name: Infrastructure
      collectors:
        - type: directory
          value: src/Infrastructure/.*
    - name: Bridge
      collectors:
        - type: directory
          value: src/Bridge/.*
    - name: Framework
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\Component\\Console\\.*#'
        - type: classNameRegex
          value: '#^Symfony\\Component\\DependencyInjection\\.*#'
    - name: CoreVendor
      collectors:
        - type: classNameRegex
          value: '#^MyCLabs\\Enum\\.*#'
  ruleset:
    Domain:
      - MyCLabsEnum
      - CoreVendor
    Application:
      - Domain
      - CoreVendor
    Infrastructure:
      - Domain
      - Application
      - CoreVendor
    Bridge:
      - Domain
      - Application
      - Infrastructure
      - CoreVendor
      - Framework
